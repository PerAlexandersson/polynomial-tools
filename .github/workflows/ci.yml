name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: Core crate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check lints
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

      - name: Verify package
        run: cargo package

  companions:
    name: Companion packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check MCP formatting
        run: cargo fmt --manifest-path mcp/Cargo.toml --all -- --check

      - name: Check MCP lints
        run: cargo clippy --manifest-path mcp/Cargo.toml --all-targets -- -D warnings

      - name: Run MCP tests
        run: cargo test --manifest-path mcp/Cargo.toml --all-targets

      - name: Check web package
        run: cargo check --manifest-path web/Cargo.toml
